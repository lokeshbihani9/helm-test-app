service:
  name: helm-svc
  identifier: helmsvc
  orgIdentifier: default
  projectIdentifier: cd_explore_lokesh
  serviceDefinition:
    spec:
      manifests:
        - manifest:
            identifier: helmManifest
            type: HelmChart
            spec:
              store:
                type: Github
                spec:
                  connectorRef: lokeshGithubConnector
                  gitFetchType: Branch
                  folderPath: charts/nginx-app
                  repoName: helm-test-app
                  branch: main
              subChartPath: ""
              valuesPaths:
                - charts/nginx-app/values.yaml
              optionalValuesYaml: false
              skipResourceVersioning: false
              enableDeclarativeRollback: false
              helmVersion: V3
              fetchHelmChartMetadata: false
    type: NativeHelm
