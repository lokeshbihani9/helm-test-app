apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: app
          image: nginx:alpine
          volumeMounts:
            - name: cfg
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: {{ .Release.Name }}-config
