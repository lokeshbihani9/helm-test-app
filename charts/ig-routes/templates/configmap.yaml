apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-ig-routes
data:
  routes.json: |
    {
      "handler": {
        "type": "DispatchHandler",
        "config": {
          "bindings": [
            {
              "condition": "{{ .Values.igRoutes.clientValidation.condition }}",
              "handler": "ClientValidationHandler"
            },
            {
              "condition": "{{ .Values.igRoutes.clientValidation.tokenCheck }}",
              "handler": "TokenHandler"
            },
            {
              "condition": "{{ .Values.igRoutes.safeExpressions.comparison }}",
              "handler": "HealthCheckHandler"
            }
          ]
        }
      }
    }
  {{- if .Values.igRoutes.verifyFix }}
  verify-fix.json: |
    {
      "notEmpty": "{{ .Values.igRoutes.verifyFix.notEmpty }}",
      "bangEmpty": "{{ .Values.igRoutes.verifyFix.bangEmpty }}",
      "sizeOp": "{{ .Values.igRoutes.verifyFix.sizeOp }}",
      "chainedPrefix": "{{ .Values.igRoutes.verifyFix.chainedPrefix }}",
      "functionCall": "{{ .Values.igRoutes.verifyFix.functionCall }}",
      "comparison": "{{ .Values.igRoutes.verifyFix.comparison }}",
      "harnessSecret": "{{ .Values.igRoutes.verifyFix.harnessSecret }}",
      "noSpace": "{{ .Values.igRoutes.verifyFix.noSpace }}",
      "literal": "{{ .Values.igRoutes.verifyFix.literal }}",
      "nullLiteral": "{{ .Values.igRoutes.verifyFix.nullLiteral }}"
    }
  {{- end }}